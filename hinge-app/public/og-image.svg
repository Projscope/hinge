<svg width="1200" height="630" viewBox="0 0 1200 630" xmlns="http://www.w3.org/2000/svg">
  <rect width="1200" height="630" fill="#0f0e0c"/>

  <!-- Subtle grid lines -->
  <line x1="0" y1="315" x2="1200" y2="315" stroke="rgba(255,255,255,0.04)" stroke-width="1"/>
  <line x1="600" y1="0" x2="600" y2="630" stroke="rgba(255,255,255,0.04)" stroke-width="1"/>

  <!-- Gold accent bar -->
  <rect x="100" y="220" width="60" height="4" rx="2" fill="#c8922a"/>

  <!-- Wordmark -->
  <text x="100" y="310" font-family="Georgia, serif" font-size="72" fill="#f5f2ea" letter-spacing="-2">my</text>
  <text x="222" y="310" font-family="Georgia, serif" font-size="72" fill="#c8922a" letter-spacing="-2">hinge</text>

  <!-- Tagline -->
  <text x="100" y="365" font-family="system-ui, sans-serif" font-size="24" fill="rgba(245,242,234,0.55)" letter-spacing="0.5">Stop managing tasks. Start finishing goals.</text>

  <!-- Bottom pills -->
  <rect x="100" y="430" width="160" height="36" rx="18" fill="rgba(200,146,42,0.15)" stroke="rgba(200,146,42,0.3)" stroke-width="1"/>
  <text x="180" y="453" font-family="system-ui, sans-serif" font-size="14" fill="#c8922a" text-anchor="middle">One goal / day</text>

  <rect x="276" y="430" width="180" height="36" rx="18" fill="rgba(255,255,255,0.05)" stroke="rgba(255,255,255,0.1)" stroke-width="1"/>
  <text x="366" y="453" font-family="system-ui, sans-serif" font-size="14" fill="rgba(245,242,234,0.6)" text-anchor="middle">Streak tracking</text>

  <rect x="472" y="430" width="150" height="36" rx="18" fill="rgba(255,255,255,0.05)" stroke="rgba(255,255,255,0.1)" stroke-width="1"/>
  <text x="547" y="453" font-family="system-ui, sans-serif" font-size="14" fill="rgba(245,242,234,0.6)" text-anchor="middle">Free forever</text>

  <!-- URL -->
  <text x="1100" y="580" font-family="system-ui, sans-serif" font-size="18" fill="rgba(245,242,234,0.25)" text-anchor="end">myhinge.app</text>
</svg>
